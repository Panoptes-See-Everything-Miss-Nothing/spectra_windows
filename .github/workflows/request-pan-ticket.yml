name: Request Ticket Number

on:
  issues:
    types: [opened]

jobs:
  request:
    runs-on: ubuntu-latest
    steps:
      - name: Ask helpers repo for next PAN- number
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}   # same PAT
          repository: vkappledore/helpers
          event-type: request_ticket_number
          client-payload: |
            {
              "caller_repo": "${{ github.repository }}",
              "repo_owner": "${{ github.repository_owner }}",
              "repo_name": "${{ github.event.repository.name }}",
              "issue_number": ${{ github.event.issue.number }},
              "issue_node_id": "${{ github.event.issue.node_id }}"
            }

  receive:
    needs: request
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Wait for PAN- number and comment + label
        uses: actions/github-script@v7
        if: github.event.client_payload && github.event.client_payload.pan_ticket
        with:
          script: |
            const ticket = context.payload.client_payload.pan_ticket
            github.rest.issues.createComment({
              issue_number: context.payload.client_payload.issue_number,
              owner: context.payload.client_payload.repo_owner,
              repo: context.payload.client_payload.repo_name,
              body: `Assigned global ticket ID: **${ticket}**`
            })
            github.rest.issues.addLabels({
              issue_number: context.payload.client_payload.issue_number,
              owner: context.payload.client_payload.repo_owner,
              repo: context.payload.client_payload.repo_name,
              labels: [ticket]
            })
